# ============================================================
# 이 파일이 하는 일: 2시간마다 자동으로
#   1) 네이버 API로 맛집 언급 데이터를 수집하고
#   2) index.html을 새로 만들고
#   3) GitHub Pages(같은 저장소 안의 무료 호스팅)에 배포한다
# 사람이 컴퓨터를 켜지 않아도, GitHub 서버에서 알아서 실행된다.
# (Netlify는 더 이상 쓰지 않는다 - 크레딧 문제 때문에 GitHub Pages로 이전 완료)
# ============================================================

name: Daily trend update

# --- 언제 실행할지 ---------------------------------------------------------
# 2시간마다(하루 12번) 자동 실행 + 수동 실행 버튼도 제공
# - UTC 정각(00:00, 02:00, ...)은 전 세계에서 예약 작업이 가장 몰리는 시간이라
#   일부러 정각을 피해서 45분 뒤로 미뤄뒀습니다 (혼잡으로 인한 지연 가능성을 줄이기 위함)
# - 이 스케줄은 한국시간 기준 매 홀수 시(1,3,5,7,9,...,23시) 45분에 돕니다
#   예: 01:45, 03:45, 05:45, 07:45, 09:45, 11:45, 13:45, 15:45, 17:45, 19:45, 21:45, 23:45 (KST)
# - 실행 자체도 완료까지 몇 분 걸리므로, 이 여유분까지 감안한 시간입니다
# - 다만 GitHub Actions는 예약 실행 시간을 100% 보장하지 않으므로, 아주 가끔
#   몇 분~몇십 분 늦어질 수 있습니다 (GitHub 측 공식 안내 사항)
# - 네이버 오픈 API 일일 호출 한도(검색 25,000건/일)는 실행 1회당 대략 700~900건
#   정도 쓰므로, 하루 12번(약 8,000~11,000건)을 돌려도 한도 안에 넉넉히 들어옵니다.
#   다만 후보 식당이 많은 날은 호출량이 늘 수 있으니, 가끔 네이버 개발자센터에서
#   "비로그인 오픈 API 당일 사용량"을 확인해보는 걸 권장합니다.
on:
  schedule:
    - cron: '45 */2 * * *'
  workflow_dispatch:
    # 위 자동 스케줄 외에도, GitHub Actions 탭에서 "Run workflow" 버튼으로
    # 언제든 수동으로도 즉시 실행할 수 있게 해주는 설정 (테스트할 때 유용)

# streak_history.json을 저장소에 다시 커밋하고, GitHub Pages에 배포하려면
# 아래 세 가지 쓰기 권한이 필요하다
permissions:
  contents: write
  pages: write
  id-token: write

# 같은 배포가 겹쳐 실행되지 않도록 하는 안전장치 (GitHub 공식 권장 설정)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1번째 작업: 데이터를 만들고 "배포 재료"를 준비한다
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v6

      - name: 파이썬 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 데이터 수집 및 index.html 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_and_build.py

      # "며칠 연속 급상승"을 계산하려면 어제 기록이 필요하므로,
      # 방금 갱신된 streak_history.json을 저장소에 다시 커밋해둔다
      - name: 연속 상승 기록(streak_history.json) 저장소에 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streak_history.json
          git diff --cached --quiet || git commit -m "chore: streak_history.json 갱신 [skip ci]"

          # 데이터 수집(최근 기준 약 15분)이 진행되는 동안 사람이 직접 main에
          # 새 커밋을 올리면, 그 시점엔 이 워크플로우가 들고 있는 로컬 코드가
          # 원격보다 뒤처진 상태라 그냥 push하면 "rejected (fetch first)"
          # 에러로 실패한다. 그래서 push 직전에 원격의 최신 커밋을 rebase로
          # 받아온 뒤 재시도한다 (최대 5번, 매번 5초 쉬었다가 재시도 - 그 사이에
          # 또 새 커밋이 와도 결국엔 순서대로 반영되게 하기 위함).
          for i in 1 2 3 4 5; do
            if git push; then
              echo "푸시 성공 (시도 $i/5)"
              break
            fi
            echo "푸시 실패 (시도 $i/5) - 원격 변경사항을 받아와서 재시도합니다"
            git fetch origin main
            git rebase origin/main
            sleep 5
          done

      # index.html/robots.txt 외에, PWA(홈 화면 설치) 관련 정적 파일들도
      # 같이 배포 폴더에 담는다
      - name: 배포용 폴더 준비
        run: |
          mkdir -p dist
          cp index.html dist/
          cp robots.txt dist/
          cp icon.svg icon-192.png icon-512.png apple-touch-icon.png manifest.json sw.js dist/

      # 아래 두 단계는 GitHub Pages 배포를 위한 공식 준비 작업
      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 배포 재료(dist 폴더) 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 2번째 작업: 위에서 준비된 재료를 실제로 GitHub Pages에 배포한다
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
